<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hương Kid - Shop Bé Trai</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background: #f0f2f5; margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        #header { 
            background: #0084ff; color: white; padding: 15px; 
            text-align: center; font-size: 18px; font-weight: bold; flex-shrink: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        #messages { 
            flex: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 12px; 
            background: #ffffff;
        }
        .msg { 
            max-width: 80%; padding: 10px 14px; border-radius: 18px; 
            font-size: 16px; line-height: 1.4; word-wrap: break-word;
        }
        .user { align-self: flex-end; background: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: #e4e6eb; color: #050505; border-bottom-left-radius: 4px; }
        
        #input-area { 
            padding: 10px; display: flex; background: white; 
            border-top: 1px solid #ddd; align-items: center;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }
        input { 
            flex: 1; border: 1px solid #ddd; padding: 12px; 
            border-radius: 20px; font-size: 16px; outline: none; background: #f0f2f5;
        }
        #sendBtn { 
            background: #0084ff; color: white; border: none; 
            width: 45px; height: 45px; border-radius: 50%; 
            margin-left: 8px; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
        }
        .chat-img { width: 100%; max-width: 200px; border-radius: 8px; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="header">Hương Kid - Shop Bé Trai</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Hỏi shop về size, mẫu mã..." autocomplete="off">
        <button id="sendBtn">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>

    <script>
        const messageContainer = document.getElementById('messages');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');

        // Tạo ID người dùng ngẫu nhiên để lưu lịch sử
        let userId = localStorage.getItem('hk_userId') || 'kh_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('hk_userId', userId);

        function addMsg(text, sender) {
            if(!text) return;
            const div = document.createElement('div');
            div.className = 'msg ' + sender;
            
            // Xử lý xuống dòng và ảnh [IMG]
            let content = text.replace(/\n/g, '<br>');
            content = content.replace(/\[IMG\](.*?)\[\/IMG\]/g, (match, url) => {
                return `<img src="${url.trim()}" class="chat-img" onclick="window.open('${url.trim()}', '_blank')">`;
            });

            div.innerHTML = content;
            messageContainer.appendChild(div);
            messageContainer.scrollTop = messageContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            input.value = '';

            try {
                // Gọi đến API /chat của server trên Render
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, userId: userId })
                });
                
                const data = await res.json();
                addMsg(data.reply, 'bot');
            } catch (e) {
                addMsg("Dạ hệ thống bận tí, chị nhắn lại sau nha!", 'bot');
            }
        }

        btn.onclick = sendMessage;
        input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

        // Chào mừng khách khi vào trang
        window.onload = () => {
            addMsg("Dạ shop Hương Kid chào chị ạ! Chị cần tìm đồ cho bé mấy kg ạ?", 'bot');
        };
    </script>
</body>
</html>
